import_lint:
  common:
    severity: warning
  rules:
    domain_isolation:
      target_file_path: 'lib/features/*/domain/**.dart'
      not_allowed_imports:
        - 'lib/features/*/data/**'
        - 'lib/features/*/presentation/**'
        - 'lib/features/*/infrastructure/**'
        - 'lib/core/design_system/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'lib/core/storage/**'
        - 'package:flutter/**'
        - 'dart:ui'
        - 'package:flutter_riverpod/**'
        - 'package:hooks_riverpod/**'
        - 'package:go_router/**'
        - 'package:shared_preferences/**'
      excluded_imports: []
    design_system_isolation:
      target_file_path: 'lib/core/design_system/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'lib/core/storage/**'
      excluded_imports: []
    core_audio_domain_isolation:
      target_file_path: 'lib/core/audio/domain/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/audio/data/**'
        - 'lib/core/audio/infrastructure/**'
        - 'lib/core/design_system/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'lib/core/storage/**'
        - 'package:flutter/**'
        - 'package:flutter_riverpod/**'
        - 'package:hooks_riverpod/**'
        - 'package:go_router/**'
        - 'package:shared_preferences/**'
      excluded_imports: []
    core_audio_data_isolation:
      target_file_path: 'lib/core/audio/data/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/audio/infrastructure/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'package:flutter/widgets.dart'
        - 'package:flutter/material.dart'
        - 'package:go_router/**'
      excluded_imports: []
    core_audio_infrastructure_isolation:
      target_file_path: 'lib/core/audio/infrastructure/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/design_system/**'
        - 'lib/core/router/**'
      excluded_imports: []
    core_preferences_domain_isolation:
      target_file_path: 'lib/core/preferences/domain/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/preferences/data/**'
        - 'lib/core/preferences/application/**'
        - 'lib/core/design_system/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'lib/core/storage/**'
        - 'package:flutter/**'
        - 'dart:ui'
        - 'package:flutter_riverpod/**'
        - 'package:hooks_riverpod/**'
        - 'package:go_router/**'
        - 'package:shared_preferences/**'
      excluded_imports: []
    core_preferences_data_isolation:
      target_file_path: 'lib/core/preferences/data/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/preferences/application/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'package:flutter/widgets.dart'
        - 'package:flutter/material.dart'
        - 'package:go_router/**'
      excluded_imports: []
    core_preferences_application_isolation:
      target_file_path: 'lib/core/preferences/application/**.dart'
      not_allowed_imports:
        - 'lib/features/**'
        - 'lib/core/router/**'
        - 'package:flutter/widgets.dart'
        - 'package:flutter/material.dart'
        - 'package:go_router/**'
      excluded_imports: []
    data_isolation:
      target_file_path: 'lib/features/*/data/**.dart'
      not_allowed_imports:
        - 'lib/features/*/presentation/**'
        - 'lib/core/di/**'
        - 'lib/core/router/**'
        - 'package:flutter/widgets.dart'
        - 'package:flutter/material.dart'
        - 'package:go_router/**'
      excluded_imports: []
    launch_isolation:
      target_file_path: 'lib/features/launch/**.dart'
      not_allowed_imports:
        - 'lib/features/game/**'
      excluded_imports: []
    router_game_boundary:
      target_file_path: 'lib/core/router/**.dart'
      not_allowed_imports:
        - 'lib/features/game/domain/**'
        - 'lib/features/game/data/**'
      excluded_imports: []
    presentation_isolation:
      target_file_path: 'lib/features/*/presentation/**.dart'
      not_allowed_imports:
        - 'lib/features/*/data/**'
        - 'lib/features/*/infrastructure/**'
        - 'lib/core/storage/**'
      excluded_imports: []
    presentation_controller_isolation:
      target_file_path: 'lib/features/*/presentation/controllers/**.dart'
      not_allowed_imports:
        - 'lib/features/*/presentation/dialogs/**'
        - 'lib/features/*/presentation/pages/**'
        - 'lib/features/*/presentation/utils/rendering/**'
        - 'lib/features/*/presentation/widgets/**'
      excluded_imports: []
    settings_feature_isolation:
      target_file_path: 'lib/features/settings/**.dart'
      not_allowed_imports:
        - 'lib/features/game/**'
      excluded_imports: []
    game_feature_isolation:
      target_file_path: 'lib/features/game/**.dart'
      not_allowed_imports:
        - 'lib/features/settings/**'
      excluded_imports: []
